<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Prueba</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 1rem;
            width: 100%;
            text-align: center;
        }
        main {
            background-color: white;
            padding: 2rem;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            max-width: 800px;
            width: 100%;
        }
        footer {
            margin-top: auto;
            background-color: #4CAF50;
            color: white;
            padding: 1rem;
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Bienvenido a la Página de Prueba</h1>
    </header>
    <main>
        <h2>Contenido Principal</h2>
        <p>Esta es una página de prueba para demostrar una estructura básica de un archivo HTML.</p>
        <p>Puedes modificar este contenido según tus necesidades.</p>
    </main>
    <footer>
        <p>© 2024 Página de Prueba. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
