<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#bg)"/>
  <circle cx="700" cy="-10" r="190" fill="rgba(255,255,255,0.05)"/>
  <circle cx="100" cy="310" r="150" fill="rgba(255,255,255,0.05)"/>

  <!-- Mesh network connections (edges) -->
  <!-- Hub node is at 400,145 -->
  <!-- Node positions: A(160,70) B(400,50) C(640,80) D(680,180) E(580,240) F(220,240) G(120,180) -->

  <!-- Edge lines between nodes -->
  <line x1="400" y1="145" x2="160" y2="70" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
  <line x1="400" y1="145" x2="400" y2="50" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
  <line x1="400" y1="145" x2="640" y2="80" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
  <line x1="400" y1="145" x2="680" y2="180" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
  <line x1="400" y1="145" x2="580" y2="240" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
  <line x1="400" y1="145" x2="220" y2="240" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
  <line x1="400" y1="145" x2="120" y2="180" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
  <!-- Outer connections -->
  <line x1="160" y1="70" x2="400" y2="50" stroke="rgba(255,255,255,0.14)" stroke-width="1.2"/>
  <line x1="400" y1="50" x2="640" y2="80" stroke="rgba(255,255,255,0.14)" stroke-width="1.2"/>
  <line x1="640" y1="80" x2="680" y2="180" stroke="rgba(255,255,255,0.14)" stroke-width="1.2"/>
  <line x1="680" y1="180" x2="580" y2="240" stroke="rgba(255,255,255,0.14)" stroke-width="1.2"/>
  <line x1="580" y1="240" x2="220" y2="240" stroke="rgba(255,255,255,0.14)" stroke-width="1.2"/>
  <line x1="220" y1="240" x2="120" y2="180" stroke="rgba(255,255,255,0.14)" stroke-width="1.2"/>
  <line x1="120" y1="180" x2="160" y2="70" stroke="rgba(255,255,255,0.14)" stroke-width="1.2"/>
  <!-- Cross connections -->
  <line x1="160" y1="70" x2="680" y2="180" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="640" y1="80" x2="220" y2="240" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="120" y1="180" x2="580" y2="240" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Hub node (center) with radio rings -->
  <circle cx="400" cy="145" r="55" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <circle cx="400" cy="145" r="38" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <circle cx="400" cy="145" r="24" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <circle cx="400" cy="145" r="12" fill="rgba(255,255,255,0.3)"/>
  <text x="400" y="173" text-anchor="middle" fill="white" font-family="monospace" font-size="9" opacity="0.7">LoRa Hub</text>

  <!-- Node A: top-left -->
  <circle cx="160" cy="70" r="20" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.32)" stroke-width="1.5"/>
  <circle cx="160" cy="70" r="8" fill="rgba(255,255,255,0.35)"/>
  <circle cx="160" cy="70" r="30" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.2"/>
  <circle cx="160" cy="70" r="42" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.2"/>
  <text x="160" y="100" text-anchor="middle" fill="white" font-family="monospace" font-size="9" opacity="0.6">Node A</text>

  <!-- Node B: top-center -->
  <circle cx="400" cy="50" r="18" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <circle cx="400" cy="50" r="7" fill="rgba(255,255,255,0.35)"/>
  <text x="400" y="30" text-anchor="middle" fill="white" font-family="monospace" font-size="9" opacity="0.6">Node B</text>

  <!-- Node C: top-right -->
  <circle cx="640" cy="80" r="20" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.32)" stroke-width="1.5"/>
  <circle cx="640" cy="80" r="8" fill="rgba(255,255,255,0.35)"/>
  <circle cx="640" cy="80" r="30" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.2"/>
  <circle cx="640" cy="80" r="42" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.2"/>
  <text x="640" y="112" text-anchor="middle" fill="white" font-family="monospace" font-size="9" opacity="0.6">Node C</text>

  <!-- Node D: right -->
  <circle cx="680" cy="180" r="18" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <circle cx="680" cy="180" r="7" fill="rgba(255,255,255,0.35)"/>
  <text x="715" y="184" text-anchor="start" fill="white" font-family="monospace" font-size="9" opacity="0.6">Node D</text>

  <!-- Node E: bottom-right -->
  <circle cx="580" cy="240" r="18" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <circle cx="580" cy="240" r="7" fill="rgba(255,255,255,0.35)"/>
  <text x="580" y="268" text-anchor="middle" fill="white" font-family="monospace" font-size="9" opacity="0.6">Node E</text>

  <!-- Node F: bottom-left -->
  <circle cx="220" cy="240" r="18" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <circle cx="220" cy="240" r="7" fill="rgba(255,255,255,0.35)"/>
  <text x="220" y="268" text-anchor="middle" fill="white" font-family="monospace" font-size="9" opacity="0.6">Node F</text>

  <!-- Node G: left -->
  <circle cx="120" cy="180" r="18" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <circle cx="120" cy="180" r="7" fill="rgba(255,255,255,0.35)"/>
  <text x="85" y="184" text-anchor="end" fill="white" font-family="monospace" font-size="9" opacity="0.6">Node G</text>

  <!-- LoRa frequency label -->
  <rect x="310" y="260" width="180" height="28" rx="6" fill="rgba(0,0,0,0.2)"/>
  <text x="400" y="278" text-anchor="middle" fill="white" font-family="monospace" font-size="11" opacity="0.85">868 MHz · LoRa · Mesh</text>

  <!-- Meshtastic official logo (white, bottom center) -->
  <svg x="340" y="198" width="120" height="66" viewBox="0 0 100 55" xmlns="http://www.w3.org/2000/svg" style="fill-rule:evenodd;clip-rule:evenodd;">
    <g transform="matrix(0.802386,0,0,0.460028,-421.748,-122.127)">
      <g transform="matrix(0.579082,0,0,1.01004,460.975,-39.6867)">
        <path d="M250.908,330.267L193.126,415.005L180.938,406.694L244.802,313.037C246.174,311.024 248.453,309.819 250.889,309.816C253.326,309.814 255.606,311.015 256.982,313.026L320.994,406.536L308.821,414.869L250.908,330.267Z" style="fill:white;"/>
      </g>
      <g transform="matrix(0.582378,0,0,1.01579,485.019,-211.182)">
        <path d="M87.642,581.398L154.757,482.977L142.638,474.713L75.523,573.134L87.642,581.398Z" style="fill:white;"/>
      </g>
    </g>
  </svg>
</svg>
